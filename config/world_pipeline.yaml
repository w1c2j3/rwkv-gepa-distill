    base_url: https://reelxai.com/v1
    api_key_env: REELXAI_API_KEY
    api_protocol: responses
  - name: claude-sonnet-4-5-20250929
    model: claude-sonnet-4-5-20250929
    base_url: https://reelxai.com/v1
