defaults:
  api_protocol: chat_completions
  timeout_seconds: 120
  num_retries: 3
  max_tokens: 512
  prefer_stream: false

base_models:
  - name: target-model-1
    model: target-model-1
    base_url: https://example.com/v1
    api_key_env: EXAMPLE_API_KEY
  - name: target-model-2
    model: target-model-2
    base_url: https://example.com/v1
    api_key_env: EXAMPLE_API_KEY

variant_generator_model:
  name: generator-model
  model: gpt-5.4
  base_url: https://example.com/v1
  api_key_env: EXAMPLE_API_KEY
  api_protocol: responses

prompt_optimizer_model:
  name: optimizer-model
  model: gpt-5.4
  base_url: https://example.com/v1
  api_key_env: EXAMPLE_API_KEY
  api_protocol: responses
